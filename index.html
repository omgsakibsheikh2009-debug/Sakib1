channelsDatabase.push(...moreChannels);

// ক্যাটাগরি নির্ধারণ
const categoryMap = {
    'bangla': 'বাংলা', 'news': 'সংবাদ', 'sports': 'স্পোর্টস', 'music': 'মিউজিক', 
    'movies': 'সিনেমা', 'kids': 'কিডস', 'religious': 'ধর্মীয়', 'lifestyle': 'লাইফস্টাইল',
    'documentary': 'ডকুমেন্টারি', 'hindi': 'হিন্দি', 'promo': 'প্রমো', 'english': 'ইংরেজি'
};

let activeCategory = "all";
let currentChannelId = null;
let searchTerm = "";

const videoElement = document.getElementById('videoPlayer');
const channelsGrid = document.getElementById('channelsGrid');
const categoriesBar = document.getElementById('categoriesBar');
const searchInput = document.getElementById('searchInput');
const channelCountSpan = document.getElementById('channelCount');
const toastEl = document.getElementById('loadingToast');

function showLoadingToast(show) {
    if(show) toastEl.classList.add('show');
    else toastEl.classList.remove('show');
}

function playChannel(channel) {
    if(!channel || !channel.url) return;
    showLoadingToast(true);
    videoElement.pause();
    videoElement.src = '';
    videoElement.load();
    setTimeout(() => {
        videoElement.src = channel.url;
        videoElement.load();
        videoElement.play().catch(e => console.log("Play error:", e));
        const onCanPlay = () => {
            showLoadingToast(false);
            videoElement.removeEventListener('canplay', onCanPlay);
        };
        videoElement.addEventListener('canplay', onCanPlay);
        setTimeout(() => showLoadingToast(false), 4000);
    }, 50);
    
    const catName = categoryMap[channel.category] || channel.category;
    document.getElementById('currentCategoryBadge').innerText = catName;
    document.getElementById('currentChannelName').innerHTML = `<i class="fas fa-tv"></i> ${channel.name} <span>${catName}</span>`;
    document.getElementById('currentChannelDesc').innerText = channel.description || "লাইভ স্ট্রিম চলছে";
    currentChannelId = channel.id;
    
    document.querySelectorAll('.channel-card').forEach(card => {
        card.classList.remove('active-channel');
        if(card.getAttribute('data-id') == channel.id) card.classList.add('active-channel');
    });
}

function getFilteredChannels() {
    return channelsDatabase.filter(ch => {
        if(activeCategory !== "all" && ch.category !== activeCategory) return false;
        if(searchTerm && !ch.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
        return true;
    });
}

function renderChannels() {
    const filtered = getFilteredChannels();
    channelCountSpan.innerText = `${filtered.length}টি চ্যানেল`;
    if(filtered.length === 0) {
        channelsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 40px;"><i class="fas fa-search"></i> কোনো চ্যানেল পাওয়া যায়নি</div>`;
        return;
    }
    channelsGrid.innerHTML = '';
    filtered.forEach(channel => {
        const card = document.createElement('div');
        card.className = `channel-card ${currentChannelId === channel.id ? 'active-channel' : ''}`;
        card.setAttribute('data-id', channel.id);
        card.innerHTML = `
            <div class="channel-icon">${channel.icon || '📺'}</div>
            <div class="channel-details">
                <div class="channel-title">${channel.name.substring(0, 35)}</div>
                <div class="channel-category">${channel.group || (categoryMap[channel.category] || channel.category)}</div>
            </div>
            <div class="play-icon"><i class="fas fa-play-circle"></i></div>
        `;
        card.addEventListener('click', () => playChannel(channel));
        channelsGrid.appendChild(card);
    });
}

function buildCategories() {
    const categories = ["all", ...new Set(channelsDatabase.map(ch => ch.category))];
    const banglaNames = { all: 'সব', bangla: 'বাংলা', news: 'সংবাদ', sports: 'স্পোর্টস', music: 'মিউজিক', 
        movies: 'সিনেমা', kids: 'কিডস', religious: 'ধর্মীয়', lifestyle: 'লাইফস্টাইল', 
        documentary: 'ডকুমেন্টারি', hindi: 'হিন্দি', promo: 'প্রমো', english: 'ইংরেজি' };
    categoriesBar.innerHTML = '';
    categories.forEach(cat => {
        if(!banglaNames[cat] && cat !== 'all') return;
        const btn = document.createElement('button');
        btn.className = `cat-btn ${activeCategory === cat ? 'active' : ''}`;
        let icon = '';
        if(cat === 'all') icon = '<i class="fas fa-th-large"></i>';
        else if(cat === 'bangla') icon = '<i class="fas fa-tv"></i>';
        else if(cat === 'news') icon = '<i class="fas fa-newspaper"></i>';
        else if(cat === 'sports') icon = '<i class="fas fa-futbol"></i>';
        else if(cat === 'music') icon = '<i class="fas fa-music"></i>';
        else if(cat === 'movies') icon = '<i class="fas fa-film"></i>';
        else if(cat === 'kids') icon = '<i class="fas fa-child"></i>';
        else icon = '<i class="fas fa-play-circle"></i>';
        btn.innerHTML = `${icon} ${banglaNames[cat] || cat}`;
        btn.addEventListener('click', () => {
            activeCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderChannels();
        });
        categoriesBar.appendChild(btn);
    });
}

searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderChannels();
});

videoElement.addEventListener('error', () => {
    showLoadingToast(false);
    const desc = document.querySelector('.channel-description');
    if(desc && !desc.querySelector('.err-msg')) {
        const err = document.createElement('div');
        err.className = 'err-msg';
        err.style.cssText = 'margin-top:8px;color:#f97373;font-size:0.75rem';
        err.innerHTML = '<i class="fas fa-exclamation-triangle"></i> স্ট্রিম লোড হয়নি। অন্য চ্যানেল চেষ্টা করুন।';
        desc.appendChild(err);
        setTimeout(() => err.remove(), 4000);
    }
});

buildCategories();
renderChannels();

// ডিফল্ট চ্যানেল প্লে
if(channelsDatabase.length) playChannel(channelsDatabase[0]);
</script>
